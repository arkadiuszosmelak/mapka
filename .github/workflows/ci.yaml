name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Run JS actions on Node.js 24 (Node 20 is being removed from runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: fvm
        run: echo "version=$(cat .fvmrc | tr -d '\"[:space:]')" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate localization
        run: melos intl

      - name: Generate code
        run: melos gen

      - name: Analyze
        run: melos analyze

      - name: Test
        run: melos test
