name: app
description: Application shell — assembles modules into DI, routing and theme.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  core:
    path: ../core
  d_location:
    path: ../d_location
  d_translations:
    path: ../d_translations
  design_system:
    path: ../design_system
  f_home:
    path: ../f_home
  f_onboarding:
    path: ../f_onboarding
  firebase_core: ^4.10.0
  firebase_crashlytics: ^5.2.3
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_hooks: ^0.21.3+1
  flutter_localizations:
    sdk: flutter
  get_it: ^9.2.1
  go_router: ^17.3.0
  hooked_bloc: ^1.7.0
  injectable: ^3.0.0
  intl: ^0.20.2
  mapbox_maps_flutter: ^2.25.0
  talker_bloc_logger: ^5.1.17
  talker_flutter: ^5.1.17

dev_dependencies:
  build_runner: ^2.15.0
  flutter_native_splash: ^2.4.8
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.0.2
  mockito: ^5.6.4

flutter:
  uses-material-design: true

# Native splash (background color matches the design-system background tokens).
# Regenerate after changes: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FAFBFC"
  color_dark: "#131416"
  android_12:
    color: "#FAFBFC"
    color_dark: "#131416"
