name: d_directions
description: Directions data module — fetches driving routes from the Mapbox Directions API.
publish_to: none
version: 0.0.1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  core:
    path: ../core
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  retrofit: ^4.9.2

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.0.2
  json_serializable: ^6.14.0
  retrofit_generator: ^10.2.7
