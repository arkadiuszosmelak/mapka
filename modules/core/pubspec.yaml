publish_to: none
version: 0.0.1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  bloc: ^9.2.1
  bloc_concurrency: ^0.3.0
  bloc_presentation: ^1.1.2+3
  collection: ^1.19.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.3.0
  injectable: ^3.0.0
  shared_preferences: ^2.5.5
  talker_flutter: ^5.1.17

dev_dependencies:
